# Zensical (https://zensical.org) config for the Craft Ops site.
# Build with `just site` (runs zensical via uvx, nothing to install).

[project]
site_name = "RodrigoDKi Craft Ops"
site_description = "Minecraft tips and server management — command cheatsheets, gameplay tips, and RCON server admin notes."
site_author = "Rodrigo Dlugokenski"
site_url = "https://rdlu.github.io/minecraft-tui/"
repo_url = "https://github.com/rdlu/minecraft-tui"
repo_name = "rdlu/minecraft-tui"

extra_css = ["stylesheets/extra.css"]
extra_javascript = ["javascripts/accents.js"]

nav = [
  { "Home" = "index.md" },
  { "Command builder" = "builder.md" },
  { "Railroad builder" = "rail.md" },
  { "Commands" = [
    { "Selectors & coordinates" = "commands/selectors.md" },
    { "Teleporting" = "commands/teleport.md" },
    { "Items, enchants & XP" = "commands/items.md" },
    { "World control" = "commands/world.md" },
    { "Chat & moderation" = "commands/moderation.md" },
    { "Server maintenance" = "commands/maintenance.md" },
  ] },
  { "Tips" = [
    { "Early game" = "tips/early-game.md" },
    { "Farms & automation" = "tips/farms.md" },
    { "Enchanting & gear" = "tips/enchanting.md" },
    { "Nether & travel" = "tips/nether.md" },
    { "Villagers & trading" = "tips/villagers.md" },
  ] },
  { "Server management" = "server.md" },
]

[project.theme]
language = "en"
features = [
  "navigation.sections",
  "navigation.top",
  "search.suggest",
  "search.highlight",
  "toc.follow",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.theme.font]
text = "Inter"
code = "JetBrains Mono"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/rdlu/minecraft-tui"

[project.markdown_extensions.tables]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
